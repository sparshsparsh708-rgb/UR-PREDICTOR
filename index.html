<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UR PREDICTOR</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    text-align:center;
    padding:20px;
    background:#161b22;
}

h1{
    margin:0;
}

#matches{
    padding:15px;
}

.match{
    background:#161b22;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
}

.league{
    color:#58a6ff;
    font-weight:bold;
}

button{
    background:#238636;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<header>
    <h1>⚽ UR PREDICTOR</h1>
    <p>Predict. Earn. Build. Win.</p>
</header>

<div id="matches">
    Loading matches...
</div>

<script>

const API_KEY = "450acb00cf27c92f1c3b6eb6998b3dad";

const allowedLeagues = [
39,   // Premier League
140,  // La Liga
135,  // Serie A
78,   // Bundesliga
61,   // Ligue 1
307,  // Saudi Pro League
253,  // MLS
10,   // Friendlies
1,    // World Cup
4,    // Euro Championship
9,    // Copa America
5     // Nations League
];

async function loadMatches(){

    const container = document.getElementById("matches");
    container.innerHTML = "Loading matches...";

    const today = new Date().toISOString().split("T")[0];

    try{

        const response = await fetch(
        `https://v3.football.api-sports.io/fixtures?date=${today}`,
        {
            method:"GET",
            headers:{
                "x-apisports-key":API_KEY
            }
        });

        const data = await response.json();

        container.innerHTML="";

        const matches = data.response.filter(match =>
            allowedLeagues.includes(match.league.id)
        );

        if(matches.length===0){
            container.innerHTML="<h3>No matches found today.</h3>";
            return;
        }

        matches.forEach(match=>{

            const card=document.createElement("div");
            card.className="match";

            card.innerHTML=`
                <div class="league">
                    ${match.league.name}
                </div>

                <h3>
                    ${match.teams.home.name}
                    vs
                    ${match.teams.away.name}
                </h3>

                <p>
                    ${new Date(match.fixture.date).toLocaleString()}
                </p>

                <button onclick="predict('${match.teams.home.name}','${match.teams.away.name}')">
                    Predict Match
                </button>
            `;

            container.appendChild(card);
        });

    }catch(error){

        console.error(error);

        container.innerHTML=
        "<h3>Failed to load matches.</h3>";
    }
}

function predict(home,away){

    const choice = prompt(
        `Who will win?\n\n1 = ${home}\n2 = Draw\n3 = ${away}`
    );

    if(choice){
        alert("Prediction saved locally (Firebase coming soon).");
    }
}

loadMatches();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>UR PREDICTOR</title>
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center;">

    <h1>⚽ UR PREDICTOR</h1>
    <p>Live football matches (auto updated)</p>

    <button onclick="loadMatches()">Load Today’s Matches</button>

    <hr>

    <div id="matches">Click button to load matches</div>

    <script>
        async function loadMatches() {
            const container = document.getElementById("matches");
            container.innerHTML = "Loading matches...";

            try {
                const date = new Date().toISOString().split('T')[0];

                const response = await fetch(
                    "https://v3.football.api-sports.io/fixtures?date=" + date,
                    {
                        method: "GET",
                        headers: {
                            "x-apisports-key": "ed36ec18384c125fc5e516e1a993f28b"
                        }
                    }
                );

                const data = await response.json();

                container.innerHTML = "";

                if (!data.response || data.response.length === 0) {
                    container.innerHTML = "No matches today.";
                    return;
                }

                data.response.forEach(match => {
                    const home = match.teams.home.name;
                    const away = match.teams.away.name;

                    const div = document.createElement("div");

                    div.style = `
                        margin:10px auto;
                        padding:15px;
                        width:80%;
                        border:1px solid white;
                        border-radius:10px;
                        background:#1a1a1a;
                    `;

                    div.innerHTML = `
                        <h3>${home} vs ${away}</h3>
                        <button onclick="alert('Prediction feature coming soon!')">
                            Predict Match
                        </button>
                    `;

                    container.appendChild(div);
                });

            } catch (error) {
                console.log(error);
                container.innerHTML = "Error loading matches. Check API key or limit.";
            }
        }
    <script>
async function loadLeague(leagueId) {

    const url = `https://v3.football.api-sports.io/fixtures?date=${date}&league=${leagueId}`;

    const response = await fetch(url, {

        headers: {
            "x-apisports-key": "YOUR_API_KEY"
        }

    const data = await response.json();

    container.innerHTML = "";

    data.response.forEach(match => {
        const div = document.createElement("div");
        div.style = "margin:10px;padding:10px;border:1px solid white;";

        div.innerHTML = `
            <h3>${match.teams.home.name} vs ${match.teams.away.name}</h3>
            <button onclick="alert('Prediction feature coming soon!')">
                Predict Match
            </button>
        `;

        container.appendChild(div);

}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Football Predictor Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Football Predictor Pro</h1>
  <div id="points">Points: 500</div>
</header>

<section class="match">
  <h2>Real Madrid vs Barcelona</h2>

  <div class="probability">
    <p>Real Madrid Win: 55%</p>
    <p>Draw: 20%</p>
    <p>Barcelona Win: 25%</p>
  </div>

  <input id="homeGoals" type="number" placeholder="Real Madrid Goals">
  <input id="awayGoals" type="number" placeholder="Barcelona Goals">

  <button onclick="submitPrediction()">
    Predict
  </button>
</section>

<section>
  <h2>Transfer Market</h2>

  <div class="player">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Kylian_Mbappe_2019.jpg/320px-Kylian_Mbappe_2019.jpg">
    <h3>Mbappe</h3>
    <p>Price: 1200</p>
    <button onclick="buyPlayer('Mbappe',1200)">Buy</button>
  </div>

  <div class="player">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Jude_Bellingham_2023.jpg/320px-Jude_Bellingham_2023.jpg">
    <h3>Bellingham</h3>
    <p>Price: 1050</p>
    <button onclick="buyPlayer('Bellingham',1050)">Buy</button>
  </div>
</section>

<section>
  <h2>My Team</h2>
  <ul id="team"></ul>
</section>

<script src="script.js"></script>
</body>
</html>
